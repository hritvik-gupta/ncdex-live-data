name: Update NCDEX snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '35 4 * * 1-5'
    - cron: '0 7 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '15 11 * * 1-5'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run scraper (3 retries)
        run: |
          success=0
          for i in 1 2 3; do
            echo "Attempt $i..."
            if npm run scrape; then
              success=1
              break
            fi
            echo "Failed attempt $i. Retrying in 10 seconds..."
            sleep 10
          done

          if [ "$success" -ne 1 ]; then
            echo "Scraper failed after 3 attempts."
            exit 1
          fi

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_quotes.json data/last_run.txt
          git diff --cached --quiet || git commit -m "Auto update NCDEX data"
          git push
