<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCDEX Daily Snapshot</title>
  <style>
    :root{--bg:#071426;--panel:#0d1b38;--panel2:#15284d;--line:#1f3a6b;--text:#eef3ff;--muted:#9fb1d5}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .wrap{max-width:1600px;margin:0 auto;padding:24px}
    .top{display:grid;grid-template-columns:2fr 220px 180px;gap:16px;margin-bottom:18px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:20px}
    h1{margin:0 0 8px;font-size:30px}
    .sub,.muted{color:var(--muted)}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px 18px;margin-bottom:16px}
    .search{width:460px;max-width:100%;padding:14px 16px;border:1px solid #24477f;background:#112346;color:#fff;border-radius:14px;font-size:15px;outline:none}
    .table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:20px;overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:1080px}
    thead th{background:var(--panel2);text-align:left;padding:16px 18px;font-size:14px}
    tbody td{padding:14px 18px;border-top:1px solid rgba(255,255,255,.06);font-size:14px}
    .empty{padding:18px;border-radius:16px;background:#3a1521;color:#ffd6d6;border:1px solid #8b2b3d}
    @media (max-width:900px){.top{grid-template-columns:1fr}.toolbar{flex-direction:column;align-items:stretch}.wrap{padding:14px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="card">
      <h1>NCDEX Daily Snapshot</h1>
      <div class="sub">This page shows the latest JSON file generated by GitHub Actions with Playwright.</div>
    </div>
    <div class="card"><div class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em">Last updated</div><div id="updatedAt" style="font-size:22px;font-weight:700;margin-top:6px">—</div></div>
    <div class="card"><div class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em">Rows</div><div id="rowCount" style="font-size:22px;font-weight:700;margin-top:6px">0</div></div>
  </div>

  <div class="toolbar">
    <input class="search" id="searchInput" placeholder="Search commodity, expiry, price...">
    <div class="muted" id="statusText">Loading...</div>
  </div>

  <div id="emptyBox" class="empty" style="display:none"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Commodity</th><th>Expiry</th><th>LTP</th><th>Bid</th><th>Ask</th><th>Open</th><th>High</th><th>Low</th><th>Prev Close</th><th>Change</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
let rows = [];

function esc(v){return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}

function render(data){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  if(!data.length){
    document.getElementById('emptyBox').style.display = 'block';
    document.getElementById('emptyBox').textContent = 'No data found. Upload live_quotes.json into this same folder.';
    return;
  }
  document.getElementById('emptyBox').style.display = 'none';
  data.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${esc(r.commodity)}</td><td>${esc(r.expiry)}</td><td>${esc(r.ltp)}</td><td>${esc(r.bid)}</td><td>${esc(r.ask)}</td><td>${esc(r.open)}</td><td>${esc(r.high)}</td><td>${esc(r.low)}</td><td>${esc(r.close)}</td><td>${esc(r.change)}</td>`;
    tbody.appendChild(tr);
  });
}

function applyFilter(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = !q ? rows : rows.filter(r => Object.values(r).join(' ').toLowerCase().includes(q));
  render(filtered);
}

fetch('./live_quotes.json?ts=' + Date.now(), {cache:'no-store'})
  .then(r => {
    if(!r.ok) throw new Error('JSON file not found');
    return r.json();
  })
  .then(data => {
    rows = data.items || [];
    document.getElementById('updatedAt').textContent = data.updated_at || '—';
    document.getElementById('rowCount').textContent = data.row_count || 0;
    document.getElementById('statusText').textContent = 'Loaded';
    render(rows);
  })
  .catch(err => {
    document.getElementById('statusText').textContent = 'Load failed';
    document.getElementById('emptyBox').style.display = 'block';
    document.getElementById('emptyBox').textContent = 'Upload live_quotes.json into this folder after the first GitHub Actions run.';
  });

document.getElementById('searchInput').addEventListener('input', applyFilter);
</script>
</body>
</html>
